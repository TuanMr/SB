<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>QR & Barcode Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #2563eb;
      --primary-dk: #1d4ed8;
      --success:    #16a34a;
      --error:      #dc2626;
      --warning:    #f59e0b;
      --bg:         #f1f5f9;
      --surface:    #ffffff;
      --text:       #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --radius:     14px;
      --st:         env(safe-area-inset-top);
      --sb:         env(safe-area-inset-bottom);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* HEADER */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 13px 16px;
      padding-top: calc(13px + var(--st));
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 12px rgba(0,0,0,.18);
    }
    .header h1  { font-size: 16px; font-weight: 700; }
    .header sub { font-size: 11px; opacity: .75; display: block; margin-top: 1px; }
    .pill {
      background: rgba(255,255,255,.2); border-radius: 20px;
      padding: 5px 11px; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .pill .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* CONTAINER */
    .container {
      padding: 14px 14px calc(24px + var(--sb));
      max-width: 480px; margin: 0 auto;
    }

    /* CARD */
    .card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      margin-bottom: 12px; overflow: hidden;
    }
    .card-header {
      padding: 11px 15px 9px;
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    /* FIELDS */
    .field { padding: 0 15px; border-bottom: 1px solid var(--border); }
    .field:last-child { border-bottom: none; }
    .field-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      letter-spacing: .5px; padding-top: 11px;
      display: flex; align-items: center; gap: 4px;
    }
    .req-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--error); display: inline-block; }
    .field-row { display: flex; align-items: center; gap: 8px; padding-bottom: 9px; }
    .field-input {
      flex: 1; border: none; outline: none;
      font-size: 16px; font-weight: 500;
      color: var(--text); background: transparent;
      padding: 6px 0; min-width: 0;
    }
    .field-input::placeholder { color: #b0bec5; font-weight: 400; }
    .select-wrap { flex: 1; display: flex; align-items: center; position: relative; }
    .select-wrap .field-input { width: 100%; }
    .select-wrap::after { content: '▾'; color: var(--muted); font-size: 13px; pointer-events: none; flex-shrink: 0; }
    .field.invalid .field-input { color: var(--error); }
    .field.invalid .field-label { color: var(--error); }

    /* camera button */
    .btn-cam {
      width: 38px; height: 38px; border: none; border-radius: 10px;
      background: #eff6ff; color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
    }
    .btn-cam:active { background: #dbeafe; }

    /* SUBMIT */
    .btn-submit {
      width: 100%; padding: 15px;
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 12px;
    }
    .btn-submit:active  { background: var(--primary-dk); }
    .btn-submit:disabled { background: #94a3b8; cursor: default; }
    .btn-submit .spin {
      width: 17px; height: 17px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%;
      animation: rot .7s linear infinite; display: none;
    }
    .btn-submit.loading .spin { display: block; }
    .btn-submit.loading span  { opacity: .7; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* LOG */
    .log-empty { text-align: center; padding: 24px 16px; color: var(--muted); font-size: 14px; }
    .log-empty .ico { font-size: 32px; margin-bottom: 8px; }
    .log-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 15px; border-bottom: 1px solid var(--border);
    }
    .log-item:last-child { border-bottom: none; }
    .log-ico { width: 34px; height: 34px; border-radius: 9px; background: #eff6ff; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .log-info { flex: 1; min-width: 0; }
    .log-main { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-st   { font-size: 17px; flex-shrink: 0; }

    /* CAMERA MODAL */
    .cam-modal { position: fixed; inset: 0; z-index: 200; background: #000; display: none; flex-direction: column; }
    .cam-modal.open { display: flex; }
    .cam-bar {
      padding: 12px 16px; padding-top: calc(12px + var(--st));
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,.65); z-index: 10; position: relative;
    }
    .cam-bar-title { color: #fff; font-size: 15px; font-weight: 700; }
    .cam-badge { background: var(--primary); color: #fff; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .btn-cam-close { background: rgba(255,255,255,.15); border: none; border-radius: 20px; color: #fff; font-size: 14px; font-weight: 600; padding: 6px 13px; cursor: pointer; }
    .cam-vp { position: relative; flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; }

    /* html5-qrcode overrides */
    #reader { width: 100% !important; height: 100% !important; border: none !important; }
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
    #reader__scan_region { border: none !important; }
    #reader__dashboard   { display: none !important; }
    #reader img          { display: none !important; }

    /* scan frame */
    .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); width: 240px; height: 180px; pointer-events: none; z-index: 5; }
    .scan-frame::before, .scan-frame::after,
    .scan-frame .c2::before, .scan-frame .c2::after { content: ''; position: absolute; width: 26px; height: 26px; border-color: #fff; border-style: solid; }
    .scan-frame::before     { top:0;    left:0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scan-frame::after      { top:0;    right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .scan-frame .c2::before { bottom:0; left:0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .scan-frame .c2::after  { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .scan-line { position: absolute; left: 6px; right: 6px; height: 2px; background: linear-gradient(90deg, transparent, #60a5fa, transparent); animation: scanmove 2s ease-in-out infinite; }
    @keyframes scanmove {
      0%  { top: 0; opacity: 1; } 45% { top: calc(100% - 2px); opacity: 1; }
      50% { opacity: 0; top: calc(100% - 2px); } 55% { opacity: 0; top: 0; }
      60% { opacity: 1; } 100%{ top: calc(100% - 2px); opacity: 1; }
    }

    .cam-counter { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,.6); color: #fff; border-radius: 20px; padding: 5px 11px; font-size: 13px; font-weight: 700; z-index: 10; display: flex; align-items: center; gap: 5px; backdrop-filter: blur(4px); }
    .btn-flash { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.5); border: none; border-radius: 20px; color: #fff; font-size: 13px; font-weight: 600; padding: 5px 11px; cursor: pointer; z-index: 10; backdrop-filter: blur(4px); }

    /* TRÙNG banner */
    .dup-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(220,38,38,.92); color: #fff; font-size: 26px; font-weight: 900; letter-spacing: 2px; padding: 14px 30px; border-radius: 16px; z-index: 20; text-align: center; display: none; backdrop-filter: blur(6px); box-shadow: 0 8px 32px rgba(0,0,0,.4); pointer-events: none; }
    .dup-banner.show { display: block; animation: bump .25s ease; }
    .dup-banner small { display: block; font-size: 12px; font-weight: 500; margin-top: 3px; letter-spacing: 0; }
    @keyframes bump { 0%{transform:translate(-50%,-50%) scale(.7);opacity:0} 70%{transform:translate(-50%,-50%) scale(1.06)} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }

    .ok-flash { position: absolute; inset: 0; z-index: 15; background: rgba(34,197,94,.22); pointer-events: none; display: none; }
    .ok-flash.show { display: block; animation: fadeout .4s ease forwards; }
    @keyframes fadeout { from{opacity:1} to{opacity:0} }

    .cam-hint { position: absolute; bottom: 22px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.7); font-size: 13px; z-index: 10; }

    /* SNACK */
    .snack { position: fixed; bottom: calc(18px + var(--sb)); left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 9px 17px; border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 500; opacity: 0; transition: opacity .25s; white-space: nowrap; pointer-events: none; max-width: calc(100vw - 28px); overflow: hidden; text-overflow: ellipsis; }
    .snack.show { opacity: 1; }
    .snack.ok   { background: var(--success); }
    .snack.err  { background: var(--error); }
    .snack.warn { background: var(--warning); color: #000; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <h1>📦 QR &amp; Barcode Scanner</h1>
    <sub>Tự động ghi vào Google Sheets</sub>
  </div>
  <div class="pill">
    <span class="dot"></span>
    <span id="hdrCount">0</span> mã
  </div>
</div>

<div class="container">

  <!-- FORM -->
  <div class="card">
    <div class="card-header">Thông tin phiên quét</div>

    <!-- Người quét -->
    <div class="field" id="fNguoiQuet">
      <div class="field-label"><span class="req-dot"></span>&nbsp;NGƯỜI QUÉT</div>
      <div class="field-row">
        <div class="select-wrap">
          <input class="field-input" id="nguoiQuet" list="userList"
            placeholder="Chọn hoặc nhập tên…"
            autocomplete="off" autocorrect="off" spellcheck="false" />
          <datalist id="userList"></datalist>
        </div>
      </div>
    </div>

    <!-- Serial Máy -->
    <div class="field">
      <div class="field-label">SERIAL MÁY</div>
      <div class="field-row">
        <input class="field-input" id="serialMay"
          placeholder="Nhập tay hoặc dùng camera…"
          autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="btn-cam" onclick="openCamera('serialMay')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Serial SIM -->
    <div class="field">
      <div class="field-label">SERIAL SIM</div>
      <div class="field-row">
        <input class="field-input" id="serialSim"
          placeholder="Nhập tay hoặc dùng camera…"
          autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="btn-cam" onclick="openCamera('serialSim')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Người nhận -->
    <div class="field">
      <div class="field-label">NGƯỜI NHẬN <span style="color:var(--muted);font-weight:400;font-size:10px">(tùy chọn)</span></div>
      <div class="field-row">
        <input class="field-input" id="nguoiNhan"
          placeholder="Để trống nếu không có…"
          autocomplete="off" autocorrect="off" spellcheck="false" />
      </div>
    </div>
  </div>

  <!-- NÚT GỬI -->
  <button class="btn-submit" id="btnSubmit" onclick="submitForm()">
    <div class="spin"></div>
    <span>📤 Gửi lên Google Sheets</span>
  </button>

  <!-- Lịch sử -->
  <div class="card">
    <div class="card-header">
      <span>Lịch sử phiên</span>
      <button onclick="clearHistory()" style="background:none;border:none;color:var(--error);font-size:12px;font-weight:600;cursor:pointer">Xóa</button>
    </div>
    <div id="logList">
      <div class="log-empty"><div class="ico">📋</div>Chưa có bản ghi nào</div>
    </div>
  </div>

</div>

<!-- CAMERA MODAL -->
<div class="cam-modal" id="camModal">
  <div class="cam-bar">
    <div class="cam-bar-title">📷 Đang quét</div>
    <div class="cam-badge" id="camBadge">Serial Máy</div>
    <button class="btn-cam-close" onclick="closeCamera()">✕ Đóng</button>
  </div>
  <div class="cam-vp">
    <div id="reader"></div>
    <div class="scan-frame"><div class="c2"></div><div class="scan-line"></div></div>
    <div class="cam-counter">✅ <span id="camCount">0</span> đã quét</div>
    <button class="btn-flash" id="btnFlash" onclick="toggleFlash()">🔦 Flash</button>
    <div class="dup-banner" id="dupBanner">⚠️ TRÙNG!<small id="dupDetail"></small></div>
    <div class="ok-flash" id="okFlash"></div>
    <div class="cam-hint">Đưa mã vào khung để quét</div>
  </div>
</div>

<div class="snack" id="snack"></div>

<script>
// ════════════════════════════════════════════════════
//  ĐỔI URL NÀY THÀNH WEB APP URL CỦA BẠN
const API = 'https://script.google.com/macros/s/AKfycby_xrs-dcG_X_L9Ac-OfA5mxiXBI-i8g95MSNmvAfax4cKuoq_TMMsKPxeryB9d0-3b/exec';
// ════════════════════════════════════════════════════

const FIELD_LABELS = { serialMay: 'Serial Máy', serialSim: 'Serial SIM' };

let scanner = null, isScanning = false, activeField = null, flashOn = false;
let sessionCount = 0, sessionLog = [], scanned = new Set();
let lastCode = '', lastCodeTs = 0;

// Auto-load danh sách khi trang mở
window.addEventListener('load', loadUserList);

async function loadUserList() {
  try {
    const res  = await fetch(API + '?action=getUsers', { redirect: 'follow' });
    const data = await res.json();
    const dl   = document.getElementById('userList');
    dl.innerHTML = '';
    (data.users || []).forEach(name => {
      const o = document.createElement('option'); o.value = name; dl.appendChild(o);
    });
  } catch (e) {
    console.warn('Không tải được danh sách người quét:', e);
  }
}

// ── CAMERA ───────────────────────────────────────────
function openCamera(fieldId) {
  activeField = fieldId;
  document.getElementById('camBadge').textContent = FIELD_LABELS[fieldId];
  document.getElementById('camModal').classList.add('open');
  syncCount();

  scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    {
      fps: 15, qrbox: { width: 240, height: 180 }, aspectRatio: 1.78,
      supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
      formatsToSupport: [
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.DATA_MATRIX,
        Html5QrcodeSupportedFormats.PDF_417,
        Html5QrcodeSupportedFormats.AZTEC,
      ],
    },
    onScan, () => {}
  ).then(() => {
    isScanning = true; flashOn = false;
    document.getElementById('btnFlash').textContent = '🔦 Flash';
  }).catch(err => {
    showSnack('❌ ' + err.message, 'err'); closeCamera();
  });
}

function closeCamera() {
  if (scanner && isScanning)
    scanner.stop().catch(() => {}).finally(() => { scanner = null; isScanning = false; });
  document.getElementById('camModal').classList.remove('open');
  hideDup();
}

function toggleFlash() {
  if (!scanner) return;
  flashOn = !flashOn;
  scanner.applyVideoConstraints({ advanced: [{ torch: flashOn }] })
    .catch(() => showSnack('Không hỗ trợ flash', 'warn'));
  document.getElementById('btnFlash').textContent = flashOn ? '🔦 Tắt' : '🔦 Flash';
}

// ── SCAN ─────────────────────────────────────────────
function onScan(text) {
  const now = Date.now();
  if (text === lastCode && now - lastCodeTs < 1500) return;
  lastCode = text; lastCodeTs = now;

  if (scanned.has(text)) {
    document.getElementById('dupDetail').textContent =
      '"' + (text.length > 22 ? text.slice(0,22)+'…' : text) + '"';
    document.getElementById('dupBanner').classList.add('show');
    clearTimeout(window._dupT);
    window._dupT = setTimeout(hideDup, 2500);
    beep(false);
    if (navigator.vibrate) navigator.vibrate([80, 50, 80]);
    return;
  }

  document.getElementById(activeField).value = text;
  scanned.add(text);
  sessionCount++;
  syncCount();
  const f = document.getElementById('okFlash');
  f.classList.remove('show'); void f.offsetWidth; f.classList.add('show');
  beep(true);
  if (navigator.vibrate) navigator.vibrate(60);
  setTimeout(closeCamera, 600);
}

function hideDup() { document.getElementById('dupBanner').classList.remove('show'); }
function syncCount() {
  document.getElementById('camCount').textContent = sessionCount;
  document.getElementById('hdrCount').textContent = sessionCount;
}

// ── SUBMIT ───────────────────────────────────────────
async function submitForm() {
  const nguoiQuet = document.getElementById('nguoiQuet').value.trim();
  const serialMay = document.getElementById('serialMay').value.trim();
  const serialSim = document.getElementById('serialSim').value.trim();
  const nguoiNhan = document.getElementById('nguoiNhan').value.trim();

  if (!nguoiQuet) {
    document.getElementById('fNguoiQuet').classList.add('invalid');
    document.getElementById('nguoiQuet').focus();
    showSnack('⚠️ Vui lòng chọn Người quét', 'warn'); return;
  }
  document.getElementById('fNguoiQuet').classList.remove('invalid');
  if (!serialMay && !serialSim) {
    showSnack('⚠️ Nhập ít nhất Serial Máy hoặc Serial SIM', 'warn'); return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.classList.add('loading');

  let ok = false;
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nguoiQuet, serialMay, serialSim, nguoiNhan, timestamp: new Date().toISOString() }),
    });
    ok = true;
  } catch (e) { ok = false; }

  btn.disabled = false; btn.classList.remove('loading');
  showSnack(ok ? '✅ Đã ghi vào Google Sheets!' : '❌ Lỗi gửi – kiểm tra URL', ok ? 'ok' : 'err');
  sessionLog.unshift({ nguoiQuet, serialMay, serialSim, nguoiNhan, ok, ts: new Date() });
  if (sessionLog.length > 30) sessionLog.pop();
  renderLog();
  if (ok) {
    document.getElementById('serialMay').value = '';
    document.getElementById('serialSim').value = '';
    document.getElementById('nguoiNhan').value = '';
  }
}

// ── LOG ──────────────────────────────────────────────
function renderLog() {
  const el = document.getElementById('logList');
  if (!sessionLog.length) {
    el.innerHTML = '<div class="log-empty"><div class="ico">📋</div>Chưa có bản ghi nào</div>'; return;
  }
  el.innerHTML = sessionLog.map(r => `
    <div class="log-item">
      <div class="log-ico">📦</div>
      <div class="log-info">
        <div class="log-main">${x([r.serialMay,r.serialSim].filter(Boolean).join(' · ') || '(không có serial)')}</div>
        <div class="log-sub">${x(r.nguoiQuet + (r.nguoiNhan?' → '+r.nguoiNhan:'') + ' · ' + r.ts.toLocaleTimeString('vi-VN'))}</div>
      </div>
      <div class="log-st">${r.ok?'✅':'❌'}</div>
    </div>`).join('');
}

function clearHistory() {
  sessionLog = []; sessionCount = 0; scanned.clear();
  lastCode = ''; lastCodeTs = 0;
  syncCount(); renderLog();
}

// ── UTILS ────────────────────────────────────────────
function beep(ok) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = ok ? 'sine' : 'sawtooth';
    osc.frequency.value = ok ? 1400 : 280;
    g.gain.setValueAtTime(ok?.25:.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + (ok?.12:.3));
    osc.start(); osc.stop(ctx.currentTime + (ok?.12:.3));
  } catch(e) {}
}

let snackT;
function showSnack(msg, type='', ms=3000) {
  const el = document.getElementById('snack');
  el.textContent = msg;
  el.className = 'snack show' + (type?' '+type:'');
  clearTimeout(snackT);
  snackT = setTimeout(() => el.classList.remove('show'), ms);
}

function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
